server {
    listen 80;
    client_max_body_size 30M;  # keep in sync with MAX_UPLOAD_SIZE_MB + headroom

    # Transparent passthrough — no path rewriting. The backend owns its
    # entire path namespace directly (/api/v1/..., deprecated legacy
    # aliases at the unversioned paths, /health/*, /metrics, /docs), so
    # nginx must forward the exact path it received.
    #
    # HISTORY: this used to be `location /api/ { proxy_pass .../; }`, which
    # STRIPS the /api/ prefix before forwarding (a trailing-slash rewrite
    # rule). That was written before the backend had real /api/v1/ routes
    # of its own, back when "/api/" was just an arbitrary external
    # convention mapping to the backend's unversioned paths. Once the
    # backend started serving actual /api/v1/... routes, the old rule
    # collided with them: a request to /api/v1/chat would get "/api/"
    # stripped and forward "/v1/chat" — a path that doesn't exist — so the
    # new canonical API 404'd through nginx while only the deprecated
    # legacy path worked. Passthrough fixes this by not rewriting at all.
    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
